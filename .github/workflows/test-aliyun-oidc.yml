name: Test Aliyun OIDC
on:
  workflow_dispatch:

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Setup Alibaba Cloud SDK
        uses: alibabacloud-actions/setup-aliyun-cli@v3

      - name: Authenticate with OIDC
        id: authenticate
        uses: alibabacloud-actions/auth-oidc@v1
        with:
          region: cn-beijing
          oidc-provider-arn: acs:ram::1421183152632398:oidc-provider/github_actions
          role-arn: acs:ram::1421183152632398:role/github-actions-cicd
          role-session-name: GitHubActionsSession

      - name: Verify OIDC Login
        run: aliyun sts GetCallerIdentity
